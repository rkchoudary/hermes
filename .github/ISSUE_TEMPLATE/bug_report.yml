name: Bug report
description: Something in Hermes isn't behaving the way the docs / code says it should.
title: "[bug] "
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough context that someone other than you can reproduce the issue.

        For **security vulnerabilities**, do NOT use this form — see [SECURITY.md](https://github.com/rkchoudary/hermes/blob/main/SECURITY.md) for the disclosure process.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe? What did you expect instead?
      placeholder: |
        Ran `pnpm auto:work TP-...`, expected the worker to dispatch, but got X.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimum sequence of commands or actions.
      placeholder: |
        1. cd to a fresh repo
        2. pnpm auto:init
        3. pnpm auto:plan --module M01 --version v0.1 --type frd-author --auto-fill
        4. pnpm auto:work
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant excerpts from /tmp/harness-runs/*.log or terminal output. Strip secrets.
      render: shell

  - type: input
    id: hermes-version
    attributes:
      label: Hermes version
      description: Output of `git log --oneline -1` from your hermes checkout.
      placeholder: e.g. cf19439 feat(rag): real RAG pipeline
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. v22.11.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.1, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Hermes env vars set
      description: |
        e.g. `AUTO_HARNESS_DRIVER=1`, `HERMES_PROJECT_ROOT=...`, `AUTO_USE_SANDBOX=1`, `HERMES_RAG_DISABLE=1`.
        Don't paste secrets.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I read [SECURITY.md](https://github.com/rkchoudary/hermes/blob/main/SECURITY.md) and this is NOT a security issue.
          required: true
        - label: I checked open issues and this isn't a duplicate.
          required: true
