name: Feature request
description: Suggest a capability Hermes should have.
title: "[feat] "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Strong feature requests describe **the problem you're trying to solve**, not just the solution. We can find better solutions together when we understand the full context.

        Check [ROADMAP.md](https://github.com/rkchoudary/hermes/blob/main/ROADMAP.md) first — your idea may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The user-facing pain point. What were you trying to do? Why is the current behavior insufficient?
      placeholder: |
        I'm running Hermes on a 200-module monorepo. The dashboard at :7777 doesn't paginate, so I can't see modules past ~30 in one view.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea for how to solve it, describe it here. Don't worry if you don't.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - "Small (a few hours)"
        - "Medium (a few days)"
        - "Large (a few weeks)"
        - "Strategic (months)"
        - "I don't know"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How blocking is this for you?
      options:
        - "Nice to have"
        - "Improves my workflow"
        - "Blocking my use case"
        - "Blocking us from adopting Hermes"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I checked ROADMAP.md and this isn't already planned.
          required: true
        - label: I checked open issues and this isn't a duplicate.
          required: true
