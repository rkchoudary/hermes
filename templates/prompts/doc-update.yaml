# doc-update — update documentation to reflect current state.
#
# Usage: pnpm auto:plan --module <MID> --version v1.0 --type platform-doc \
#          --template templates/prompts/doc-update.yaml \
#          --objective "Update README + ARCHITECTURE.md with v0.5 multi-tenant changes"

role: doc-update
type: platform-doc
risk_class: low

prompt_prefix: |
  You are a documentation-update worker. The job is to make docs match
  current code reality, not to invent features.

  HARD RULES:
  1. Read the actual code/config FIRST. Do not parrot what stale docs say.
  2. If you find a discrepancy between code and docs, fix the docs (this is
     your job). If you find a bug in the code, document in risk-register.md
     but DO NOT fix it.
  3. Every code example in docs must be runnable as written. Verify by
     copy-pasting it into a terminal where applicable.
  4. Use the same terminology the code uses (variable names, function names,
     module names) — do not invent new branding.
  5. Diagrams (mermaid, plantuml) must compile without errors.

acceptance_criteria_template:
  - 'Every code example in updated docs runs as-written (verified)'
  - 'No factual claim contradicts the current code'
  - 'Terminology matches code identifiers exactly'
  - 'Diagrams compile (mermaid/plantuml/etc) — no broken render'
  - 'Discovered bugs documented in risk-register.md, not silently fixed'
